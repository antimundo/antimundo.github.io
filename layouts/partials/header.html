<header>
  <style>
    header {
      width: 100%;
      background: #ecdecb;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      justify-content: center;
    }

    .header-inner {
      width: 100%;
      max-width: 1400px;

      display: flex;
      align-items: center;
      justify-content: space-between;

      gap: 18px;
      padding: 12px 18px;
    }

    .profile-img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;

      border: 1px solid rgba(0, 0, 0, 0.12);
      flex-shrink: 0;
    }

    header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: -0.01em;
      white-space: nowrap;
      color: #243634;
      flex-shrink: 0;
    }

    header nav:first-of-type {
      display: flex;
      align-items: center;
      margin-right: auto;
    }

    header nav ul {
      list-style: none;
      display: flex;
      gap: 12px;
      padding: 0;
      margin: 0;
      align-items: center;
    }

    header nav ul li a {
      display: inline-flex;
      align-items: center;
      gap: 8px;

      padding: 12px 18px;
      border-radius: 12px;

      text-decoration: none;
      color: #181717;
      font-weight: 600;

      background: rgba(24, 23, 23, 0.08);
      transition: all 0.1s ease;

      font-size: 0.9rem;
      white-space: nowrap;
    }

    header nav ul li a.active {
      background: rgba(36, 54, 52, 0.18);
      color: #243634;
      box-shadow: inset 0 0 0 1px rgba(36, 54, 52, 0.25);
    }

    header nav ul li a:hover {
      background: rgba(24, 23, 23, 0.14);
    }

    header nav ul li a img {
      width: 18px;
      height: 18px;
    }

    .social-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .social-button {
      display: inline-flex;
      align-items: center;
      padding: 6px;
      text-decoration: none;
      background: transparent;
      white-space: nowrap;
    }

    .social-button img {
      width: 18px;
      height: 18px;
    }

    @media (max-width: 800px) {
      .header-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .profile-img {
        margin-bottom: 0;
      }

      header h1 {
        margin-bottom: 0;
      }

      header nav {
        width: 100%;
      }

      header nav ul {
        flex-direction: column;
        align-items: flex-start;
        width: 100%;
      }

      header nav ul li {
        width: 100%;
      }

      header nav ul li a {
        width: 100%;
        box-sizing: border-box;
      }

      .social-buttons {
        width: 100%;
        margin-top: 10px;
      }
    }
  </style>

  <div class="header-inner">
    <div class="brand">
      <img class="profile-img" src="/images/profile.png" alt="Profile">
      <h1>
        <a href="/" style="text-decoration:none;color:inherit;">
          {{ .Site.Title }}
        </a>
      </h1>
    </div>
    <nav>
      <ul>
        {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}" class="{{ if eq (trim .URL " /") (trim $.RelPermalink "/" ) }}active{{ end }}">
            <img src="/images/icons/{{ .Params.icon }}" alt="{{ .Name }}" />
            <span>{{ .Name }}</span>
          </a>
        </li>
        {{ end }}
      </ul>
    </nav>

    {{ with index site.Data "social_media" }}
    <div class="social-buttons">
      {{ range . }}
      {{ if .id }}
      <a href="{{ .href }}" title="{{ .title }}" rel="me" class="social-button">
        <img src="/images/social/{{ .icon }}" alt="{{ .title }}">
      </a>
      {{ end }}
      {{ end }}
    </div>
    {{ end }}
  </div>
</header>
