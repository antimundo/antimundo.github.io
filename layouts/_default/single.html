{{ define "main" }}
<article>
  <style>
    article {
      margin: 0 auto;
      padding: 1rem;
      line-height: 1.5;
    }

    .article-top {
      margin-bottom: 2rem;
    }

    .article-top h1 {
      font-size: 2rem;
      margin-bottom: 0.3rem;
      line-height: 1.2;
    }

    .article-top p {
      color: #666;
      font-size: 0.9rem;
      margin: 0 0 1rem 0;
    }

    .article-top img {
      max-width: 100%;
      max-height: 240px;
      width: auto;
      height: auto;
      display: block;
      margin-top: 0.5rem;
      border-radius: 6px;
    }

    article p {
      margin: 1rem 0;
    }

    article img {
      max-width: 100%;
      height: auto;
      margin: 0.5rem auto;
    }

    article video {
      max-width: 100%;
      height: auto;
    }

    article a:hover {
      text-decoration: underline;
    }

    .img-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
    }

    .img-container img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    blockquote {
      margin: 1.5em 0;
      padding: 6px 0px 6px 1em;
      border-left: 3px solid gray;
      background-color: rgba(128, 128, 128, 0.1);
    }

    .highlight {
      overflow: auto;
    }
  </style>
  <div class="article-top">
    <h1>{{ .Title }}</h1>
    {{ if eq .Section "posts" }}
    <p>{{ .Date.Format "2006-01-02" }}</p>
    {{ end }}
    {{ with .Params.teaser }}
    <img src="{{ . | relURL }}" alt="Teaser image">
    {{ end }}
  </div>
  {{ .Content }}
</article>
{{ end }}
