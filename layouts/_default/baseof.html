<!doctype html>
<html lang="es">

<head>
  <title>{{ .Title }} - Antimundo</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/images/profile.png">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ .Site.BaseURL }}/index.xml">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Antimundo">
  {{ if .IsHome }}
  <meta name="description" content="{{ .Site.Params.description }}">
{{ else if .Params.description }}
  <meta name="description" content="{{ .Params.description }}">
{{ else if .Summary }}
  <meta name="description" content="{{ .Summary | plainify }}">
{{ end }}
  {{ if .Params.title }}
  <meta property="og:title" content="{{ .Params.title }}">
  {{ end }}
  {{ if .Params.teaser }}
  <meta property="og:image" content="{{ .Params.teaser }}">
  <meta property="og:image:width" content="960">
  <meta property="og:image:height" content="540">
  {{ end }}
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Antimundo" />
</head>

<body>
  {{ partial "header.html" . }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}
</body>

</html>
